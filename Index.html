<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>A Cute Surprise For You! ✨</title>
    <style>
        /* सुंदर और क्यूट बैकग्राउंड */
        body {
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #ffe5ec 0%, #ffc2d1 50%, #f7aef8 100%);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            color: #4a4a4a;
        }

        .container {
            text-align: center;
            background: rgba(255, 255, 255, 0.75);
            padding: 40px 30px;
            border-radius: 24px;
            box-shadow: 0 10px 30px rgba(255, 105, 180, 0.2);
            backdrop-filter: blur(10px);
            border: 2px solid rgba(255, 255, 255, 0.5);
            max-width: 400px;
            width: 85%;
            z-index: 10;
            position: relative;
        }

        h1 {
            font-size: 2rem;
            color: #ff4d6d;
            margin-bottom: 25px;
            text-shadow: 1px 1px 2px rgba(0,0,0,0.05);
        }

        /* क्यूट बटन स्टाइल */
        .cute-btn {
            background: linear-gradient(45deg, #ff758f, #ff4d6d);
            color: white;
            border: none;
            padding: 15px 35px;
            font-size: 1.1rem;
            font-weight: bold;
            border-radius: 50px;
            cursor: pointer;
            box-shadow: 0 5px 15px rgba(255, 77, 109, 0.4);
            transition: transform 0.2s, box-shadow 0.2s;
            position: relative;
            z-index: 12;
        }

        .cute-btn:hover {
            transform: scale(1.05);
            box-shadow: 0 8px 20px rgba(255, 77, 109, 0.6);
        }

        /* पेजों को छुपाने और दिखाने के लिए */
        .page {
            display: none;
            animation: fadeIn 0.8s ease forwards;
        }

        .active {
            display: block;
        }

        /* 'Bairan' का नया इमेज लोगो स्टाइल */
        .bairan-img {
            width: 150px;
            height: 150px;
            object-fit: cover;
            border-radius: 50%;
            margin: 0 auto 20px;
            box-shadow: 0 8px 20px rgba(255, 77, 109, 0.3);
            border: 5px solid white;
            display: block;
            animation: float 4s ease-in-out infinite;
        }

        /* तैरते हुए दिलों (Hearts) का एनिमेशन */
        .heart {
            position: absolute;
            color: #ff758f;
            font-size: 20px;
            animation: fly 5s linear infinite;
            bottom: -20px;
            opacity: 0;
            z-index: 1;
        }

        /* Pop-up (Modal) स्टाइल */
        .popup-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.4);
            backdrop-filter: blur(5px);
            z-index: 100;
            justify-content: center;
            align-items: center;
        }

        .popup-box {
            background: white;
            padding: 35px 25px;
            border-radius: 20px;
            text-align: center;
            box-shadow: 0 10px 25px rgba(0,0,0,0.2);
            max-width: 320px;
            width: 80%;
            animation: popIn 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
            border: 3px solid #ffc2d1;
        }

        .popup-box h2 {
            color: #ff4d6d;
            font-size: 1.6rem;
            margin: 0;
            line-height: 1.5;
        }

        /* एनिमेशन की परिभाषाएं (Keyframes) */
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes popIn {
            from { opacity: 0; transform: scale(0.7); }
            to { opacity: 1; transform: scale(1); }
        }

        @keyframes float {
            0%, 100% { transform: translateY(0) rotate(0deg); }
            50% { transform: translateY(-12px) rotate(3deg); }
        }

        @keyframes fly {
            0% { transform: translateY(0) translateX(0) scale(0); opacity: 0; }
            10% { opacity: 0.8; }
            100% { transform: translateY(-105vh) translateX(50px) scale(1.3); opacity: 0; }
        }
    </style>
</head>
<body>

    <div class="heart" style="left: 10%; animation-delay: 0s;">❤️</div>
    <div class="heart" style="left: 25%; animation-delay: 2s; font-size: 30px;">💖</div>
    <div class="heart" style="left: 40%; animation-delay: 1s;">✨</div>
    <div class="heart" style="left: 60%; animation-delay: 3s; font-size: 25px;">🎀</div>
    <div class="heart" style="left: 75%; animation-delay: 0.5s;">🌸</div>
    <div class="heart" style="left: 90%; animation-delay: 4s;">💖</div>

    <div class="container">
        
        <div id="page1" class="page active">
            <h1>Are u ready for your surprise?</h1>
            <button class="cute-btn" onclick="goToSecondPage()">Yes, I am! ✨</button>
        </div>

        <div id="page2" class="page">
            <img src="bairan.jpg" alt="Bairan" class="bairan-img">
            
            <h1>A Special Song For You 🎵</h1>
            <p style="margin-bottom: 25px; color: #666; font-size: 1.05rem;">मैंने ये गाना सिर्फ तुम्हारे लिए गाया है...</p>
            
            <button class="cute-btn" id="listenBtn" onclick="toggleSong()">🎵 Listen Song</button>
            
            <audio id="myAudio" src="my-song.mp3"></audio>
        </div>

    </div>

    <div class="popup-overlay" id="thankYouPopup">
        <div class="popup-box">
            <h2>thankyou for listening aruu🎀</h2>
            <br>
            <button class="cute-btn" style="padding: 10px 25px; font-size: 0.9rem;" onclick="closePopup()">Close 🥰</button>
        </div>
    </div>

    <script>
        // पहले पेज से दूसरे पेज पर जाने के लिए
        function goToSecondPage() {
            document.getElementById('page1').classList.remove('active');
            document.getElementById('page2').classList.add('active');
        }

        var song = document.getElementById("myAudio");
        var btn = document.getElementById("listenBtn");
        var popup = document.getElementById("thankYouPopup");

        // गाना प्ले और पॉज करने के लिए
        function toggleSong() {
            if (song.paused) {
                song.play();
                btn.innerHTML = "⏸️ Pause Song";
                btn.style.background = "linear-gradient(45deg, #4bc0c0, #36a2eb)";
            } else {
                song.pause();
                btn.innerHTML = "🎵 Listen Song";
                btn.style.background = "linear-gradient(45deg, #ff758f, #ff4d6d)";
            }
        }

        // जैसे ही गाना खत्म होगा, यह इवेंट अपने आप पॉप-अप खोल देगा
        song.onended = function() {
            btn.innerHTML = "🎵 Listen Song";
            btn.style.background = "linear-gradient(45deg, #ff758f, #ff4d6d)";
            popup.style.display = "flex"; // पॉप-अप दिखाएं
        };

        // पॉप-अप बंद करने के लिए फंक्शन
        function closePopup() {
            popup.style.display = "none";
        }
    </script>
</body>
</html>
